title: Look Into My Realm
description: Gaming, Tech, and Adventures from the void - by GAM3RGAWD
author: GAM3RGAWD

# Site URL logic:
# - If you use a custom domain, set `url` to your domain, e.g. https://yourdomain.com.
# - If not set, it defaults to GitHub Pages username site.
# - `baseurl` is empty for root deployment (username.github.io or custom domain).
url: "https://gam3rgawd.com"
baseurl: ""

# This value is a fallback for templates if you choose to leave url blank.
# It is also a reference URL for local dev and SEO metadata.
default_site_url: "https://vitalnexus.github.io"

# Jekyll settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Asset settings
sass:
  sass_dir: assets/css
  style: compressed

# Build settings
encoding: utf-8
exclude:
  - .gitignore
  - README*.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .DS_Store
  - Guides

# Permalink settings
permalink: /:categories/:title/

# Post defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "GAM3RGAWD"
      tags: []

# Categories
category_list:
  - reviews
  - thoughts
  - technology
  - gaming
  - space-travel
  - ai-content
